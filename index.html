<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>NTF Home Page</title>
    <meta name="viewport" content="width=device-width">
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" type="text/css" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
</head>

<body>
    <main class="main-container">
        <h1 class="artwork-headline">Artwork of the week</h1>
        <section class="best-artworks">
            <div class="top-artwork">
                <img class="top-artwork-image" src="images/308fc6bcd8a7a47cad9219e8c4e8c720a41b28d0.jpg"
                    alt="Top Artwork">
                <div class="first-texts">
                    <span class="the-black">The Black</span>
                    <p class="original-series">Original Series</p>
                </div>
            </div>
            <div class="other-top-artworks-images">
                <figure class="top-artworks-figure">
                    <img class="other-top-artworks" src="images/82aa18badf7fe92226ecf60456ac66fe66e3f52d.jpg"
                        alt="Artwork 2">
                    <figcaption class="butterfly">Butterfly</figcaption>
                </figure>
                <figure class="top-artworks-figure">
                    <img class="other-top-artworks" src="images/8be46d6085495d4b89f98a4cd7e5955af4f8b8fa.jpg"
                        alt="Artwork 3">
                    <figcaption class="butterfly">Butterfly</figcaption>
                </figure>
                <figure class="top-artworks-figure">
                    <img class="other-top-artworks" src="images/8be46d6085495d4b89f98a4cd7e5955af4f8b8fa.jpg"
                        alt="Artwork 4">
                    <figcaption class="butterfly">Butterfly</figcaption>
                </figure>
                <figure class="top-artworks-figure">
                    <img class="other-top-artworks" src="images/aab1caa1499331e6b10a51366e2d8fc003718d2a.jpg"
                        alt="Artwork 5">
                    <figcaption class="butterfly">Butterfly</figcaption>
                </figure>
                <figure class="top-artworks-figure">
                    <img class="other-top-artworks" src="images/a45f56a605e14c7a382c08223a01bceff15bff10.jpg"
                        alt="Artwork 6">
                    <figcaption class="butterfly">Butterfly</figcaption>
                </figure>
                <figure class="top-artworks-figure">
                    <img class="other-top-artworks" src="images/330ae76cc57480a2c2f867ca477e79e18a738c94.jpg"
                        alt="Artwork 7">
                    <figcaption class="butterfly">Butterfly</figcaption>
                </figure>
            </div>
        </section>
        <section class="top-sellers-text-dropdown">
            <h2 class="top-sellers">Top Sellers</h2>
            <select class="time-dropdown">
                <option class="first-option">Today</option>
                <option class="second-option">Yesterday</option>
                <option class="third-option">Last Week</option>
            </select>
        </section>
        <section class="top-sellers">
            <div class="seller-card">
                <div class="seller-background-div">
                    <img class="seller-background" src="images/sellers-backgrounds/7350fde2dfc9d46c2a1a8e373516d0bfb4bdd33f.jpg" alt="Seller Background">
                </div>
                <div class="seller-avatar-div">
                    <img class="seller-avatar" src="images/sellers-avatars/ee3994c1cdf379f9f4ce80e9371b2185eb70ef20.png" alt="Seller Avatar">
                </div>
                <div class="check-mark-div">
                    <img class="check-mark" src="images/Group 1453.png" alt="Check Mark">
                </div>
                <div class="seller-texts">
                    <h3 class="courtney-henry">Courtney Henry</h3>
                    <p class="price">$1,403</p>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
